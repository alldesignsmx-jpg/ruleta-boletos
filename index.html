<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruletazo - Kenworth Aerocab T660</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f1020;
      --pink-neon: #ff5f9a;
      --cyan-neon: #00ffff;
    }

    body {
      background-color: var(--bg-dark);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    /* Títulos Neón */
    .header-section { text-align: center; margin-bottom: 30px; }
    .title-main { color: #a18cd1; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
    .title-sub { color: var(--pink-neon); font-weight: 800; text-shadow: 0 0 15px var(--pink-neon); font-size: 2rem; }
    .description { color: #ccc; font-size: 0.9rem; margin-top: 5px; }

    /* Layout */
    .main-container {
      display: flex;
      gap: 50px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* La Ruleta */
    .panel {
      position: relative;
      width: 500px;
      height: 500px;
      background: #0a0c1a;
      border-radius: 20px; /* Bordes rectos con ligera curva como la imagen */
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .needle {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent;
      border-top: 25px solid var(--pink-neon); z-index: 100; filter: drop-shadow(0 0 8px var(--pink-neon));
    }

    .wheel {
      position: relative; width: 100%; height: 100%; border-radius: 50%;
      overflow: hidden; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
      background: conic-gradient(
        #2b82ff 0% 10%, #ff6f91 10% 20%, #ffd166 20% 30%, #6ba4ff 30% 40%, #7cffcb 40% 50%,
        #ff9a8b 50% 60%, #ffe29a 60% 70%, #a18cd1 70% 80%, #fbc2eb 80% 90%, #20e3b2 90% 100%
      );
    }

    .ticks-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

    .hub {
      position: absolute; width: 120px; height: 120px; border-radius: 50%; z-index: 10;
      background: radial-gradient(circle, #fff, var(--cyan-neon) 60%, #0047ff 100%);
      display: flex; justify-content: center; align-items: center; font-weight: 900;
      color: #000; text-transform: uppercase; font-size: 0.75rem; text-align: center;
      box-shadow: 0 0 30px var(--cyan-neon);
    }

    /* Sidebar de Ganadores */
    .sidebar {
      background: rgba(20, 24, 50, 0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      width: 400px;
      padding: 25px;
    }

    .sidebar-title { text-align: center; font-weight: 700; margin-bottom: 20px; }

    .btn-sortear {
      background: #7cffcb; color: #000; font-weight: 800; border-radius: 50px;
      width: 100%; border: none; padding: 12px; transition: 0.3s;
    }
    .btn-sortear:hover { background: #56e3b0; transform: scale(1.02); }

    .table-ganadores { font-size: 0.9rem; margin-top: 15px; background: transparent; }
    .table-ganadores thead th { border-bottom: 1px solid #333; color: #888; }
    .table-ganadores td { vertical-align: middle; }
    
    .btn-ver { background: #007bff; color: white; border: none; padding: 2px 10px; border-radius: 4px; font-size: 0.8rem; text-decoration: none; }
  </style>
</head>
<body>

  <div class="header-section">
    <h4 class="title-main">RULETAZO</h4>
    <h2 class="title-sub">KENWORTH AEROCAB T660 (2015)</h2>
    <p class="description">Inicia la jugada y deja que el destino elija. Pausa o detén con inercia para ver el resultado.</p>
  </div>

  <div class="main-container">
    <div class="panel">
      <div class="needle"></div>
      <div class="wheel" id="wheel">
        <svg class="ticks-svg" viewBox="0 0 100 100">
          <defs>
            <clipPath id="ringClip">
              <path d="M 50 50 m -46 0 a 46 46 0 1 0 92 0 a 46 46 0 1 0 -92 0 M 50 50 m -36 0 a 36 36 0 1 1 72 0 a 36 36 0 1 1 -72 0" fill-rule="evenodd"></path>
            </clipPath>
            <filter id="tickGlow">
              <feDropShadow dx="0" dy="0" stdDeviation="0.8" flood-color="#000" flood-opacity="0.8"></feDropShadow>
              <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#00FFFF" flood-opacity="0.6"></feDropShadow>
            </filter>
          </defs>
          <g clip-path="url(#ringClip)" filter="url(#tickGlow)" id="tickGroup">
            </g>
        </svg>
      </div>
      <div class="hub">RESULTADO</div>
    </div>

    <div class="sidebar">
      <h5 class="sidebar-title">Generar Ganadores</h5>
      <div class="d-flex gap-2">
        <input type="number" id="qty" class="form-control text-center" value="1" readonly>
        <button class="btn-sortear" id="btnSpin">Sortear ahora</button>
      </div>

      <div id="resArea" class="mt-4" style="display:none;">
        <table class="table table-dark table-ganadores">
          <thead>
            <tr><th>#</th><th>Boleto</th><th>Nombre</th><th></th></tr>
          </thead>
          <tbody id="resList"></tbody>
        </table>
        <small class="text-muted" id="infoStats"></small>
      </div>
    </div>
  </div>

<script>
(() => {
  // CONFIGURACIÓN GANADOR MANUALLY FORZADO
  const BOLETO_FORZADO = '00101'; 
  
  const participantes = [
    { boleto: '00101', nombre_completo: "Alexis Valentín García González", url: "https://www.rifasyumai.com/c0236-boleto" },
    { boleto: '2', nombre_completo: "María López", url: "#" },
    { boleto: '3', nombre_completo: "Carlos García", url: "#" },
    { boleto: '4', nombre_completo: "Ana Torres", url: "#" },
    { boleto: '5', nombre_completo: "Luis Rivas", url: "#" },
    { boleto: '6', nombre_completo: "Sofía Hernández", url: "#" },
    { boleto: '7', nombre_completo: "Diego Martínez", url: "#" },
    { boleto: '8', nombre_completo: "Elena Díaz", url: "#" }
  ];

  const wheel = document.getElementById('wheel');
  const tickGroup = document.getElementById('tickGroup');
  let currentRotation = 0;

  // Generar Ticks SVG (Mismo estilo que tu código)
  for(let i=0; i<60; i++) {
    const angle = (i * 6) * (Math.PI / 180);
    const isMajor = i % 6 === 0;
    const x1 = 50 + 46 * Math.cos(angle);
    const y1 = 50 + 46 * Math.sin(angle);
    const x2 = 50 + (isMajor ? 32 : 35) * Math.cos(angle);
    const y2 = 50 + (isMajor ? 32 : 35) * Math.sin(angle);
    
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
    line.setAttribute("stroke", "white");
    line.setAttribute("stroke-width", isMajor ? "1.8" : "1.2");
    line.setAttribute("stroke-opacity", isMajor ? "0.95" : "0.6");
    line.setAttribute("stroke-linecap", "round");
    tickGroup.appendChild(line);
  }

  document.getElementById('btnSpin').addEventListener('click', function() {
    this.disabled = true;
    
    // Buscar al ganador
    const ganador = participantes.find(p => p.boleto === BOLETO_FORZADO);
    
    // Cálculo de ángulo: El 00101 termina en 1. Cae en el segundo segmento (Azul claro).
    // Restamos 18 para quedar en el centro del gajo de 36 grados.
    const segmentAngle = 36;
    const targetAngle = 360 - (1 * segmentAngle) - 18; 
    
    currentRotation += (360 * 8) + targetAngle; // 8 vueltas + destino
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      const resArea = document.getElementById('resArea');
      const resList = document.getElementById('resList');
      const stats = document.getElementById('infoStats');
      
      resArea.style.display = 'block';
      resList.innerHTML = `
        <tr>
          <td>1</td>
          <td class="text-info fw-bold">${ganador.boleto}</td>
          <td>${ganador.nombre_completo}</td>
          <td><a href="${ganador.url}" target="_blank" class="btn-ver">Ver</a></td>
        </tr>
      `;
      stats.innerText = `Participantes: ${participantes.length} · Total ganadores: 1`;
      this.disabled = false;
    }, 5000);
  });
})();
</script>
</body>
</html>
