<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ruletazo — Diseño Restaurado y Ticks Robustos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root {
    --bg-1: #0f1020;
    --bg-2: #1a1c3a;
    --glow: #66f4ff;
    --accent: #ff5f9a; /* Color de la aguja neón */
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    align-items: flex-start;
    background: radial-gradient(1200px 800px at 70% -20%, #2a2e75 0%, transparent 60%),
                radial-gradient(1000px 600px at -10% 120%, #3b1a4f 0%, transparent 60%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
    color: #e9f2ff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Arial, sans-serif;
  }

  .page-wrap { width: 100%; padding: 32px 16px 40px; }

  h1 {
    font-weight: 800;
    text-align: center;
    background: linear-gradient(90deg, #fff, #a7f0ff 40%, #ffa6d1 60%, #fff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 18px #60f, 0 0 28px #0ff3;
    text-transform: uppercase;
  }

  .sub { text-align: center; opacity: .85; margin-bottom: 22px; }

  /* --- PANEL REFORMADO --- */
  .panel {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 1/1;
    border-radius: 28px;
    padding: 22px;
    margin-inline: auto;
    background: radial-gradient(circle at 50% 30%, #2df 0 2px, transparent 60px),
                linear-gradient(180deg, #0a0c1a, #141832);
    box-shadow: inset 0 0 0 1px #ffffff18, 0 30px 60px #0008, 0 0 120px #0ff2;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  /* Aguja neón rosa */
  .needle {
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 26px solid var(--accent);
    filter: drop-shadow(0 0 12px var(--accent));
    z-index: 10;
  }

  /* --- RUEDA (WHEEL) - RESTAURADA --- */
  .wheel {
    width: 100%;
    height: 100%;
    position: relative;
    border-radius: 50%;
    overflow: hidden;
    transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
    background: #000; /* Fondo base para los segmentos */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Los colores de fondo de los segmentos se dibujan vía JS en el SVG */
  .ticks-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  .hub {
    position: relative;
    width: 26%;
    aspect-ratio: 1/1;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #c6f8ff 45%, #00e5ff 70%, #0047ff 100%);
    box-shadow: inset 0 0 0 4px #00000033, 0 0 40px var(--glow);
    display: grid;
    place-items: center;
    font-weight: 900;
    color: #001;
    text-transform: uppercase;
    z-index: 5;
    font-size: clamp(0.6rem, 2vw, 0.9rem);
    text-align: center;
    padding: 10px;
    line-height: 1;
  }

  /* Estilos de botones y tarjetas (Igual que antes) */
  .btn-neo {
    padding: 12px 18px; border: none; border-radius: 999px; cursor: pointer; font-weight: 800;
    color: #0a0c1a; background: linear-gradient(180deg, #e8fbff, #bff2ff);
    box-shadow: 0 10px 24px #00ffff22; transition: all .2s;
  }
  .start { background: linear-gradient(180deg, #caffbf, #7cffcb); }
  .btn-neo:disabled { opacity: 0.5; }
  .card-like { background: #141832; border-radius: 24px; padding: 20px; border: 1px solid #ffffff18; }
  
  .spark { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: #fff; pointer-events: none; }
  @keyframes fly {
    0% { opacity: 1; transform: translate(var(--x0), var(--y0)) scale(1); }
    100% { opacity: 0; transform: translate(var(--x1), var(--y1)) scale(0.2); }
  }
</style>
</head>
<body>

  <div class="page-wrap container">
    <h1>R U L E T A Z O<br>Kenworth AeroCab T660 (2015)</h1>
    <p class="sub">Diseño Restaurado de Ruleta Profesional</p>

    <div class="row g-4 align-items-center">
      <div class="col-12 col-lg-6">
        <div class="panel">
          <div class="needle"></div>
          
          <div class="wheel" id="wheel">
            <svg class="ticks-svg" id="wheelSvg" viewBox="0 0 100 100">
              <defs>
                <clipPath id="ringClip">
                  <path d="M 50 50 m -50 0 a 50 50 0 1 0 100 0 a 50 50 0 1 0 -100 0 M 50 50 m -13 0 a 13 13 0 1 1 26 0 a 13 13 0 1 1 -26 0" fill-rule="evenodd"></path>
                </clipPath>
                <filter id="tickGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="0" dy="0" stdDeviation="0.5" flood-color="#000" flood-opacity="0.8"></feDropShadow>
                  <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#00FFFF" flood-opacity="0.9"></feDropShadow>
                </filter>
              </defs>
              <g id="segmentsGroup"></g>
              <g id="tickGroup" clip-path="url(#ringClip)" filter="url(#tickGlow)"></g>
            </svg>

            <div class="hub" id="hub">RESULTADO</div>
          </div>

          <div class="burst" id="burst"></div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card-like">
          <h3 class="mb-3 text-center">Generar Ganadores</h3>  
          <div class="row g-2">
            <div class="col-7">
              <input type="number" min="1" value="1" class="form-control" id="inpN">
            </div>
            <div class="col-5 d-grid">
              <button class="btn-neo start" id="btnSortear">Sortear</button>
            </div>
          </div>

          <div class="table-responsive mt-3" id="boxGanadores" style="display:none;">
            <table class="table table-sm table-dark table-striped">
              <tbody id="tbGanadores"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const BOLETO_GANADOR_FORZADO = '00101'; 
  const participantes = [
    { boleto: 1, nombre_completo: "Juan Pérez", url: "#" },
    { boleto: 2, nombre_completo: "María López", url: "#" },
    { boleto: '00101', nombre_completo: "Carlos García (MANUAL)", url: "#" },
    { boleto: 4, nombre_completo: "Ana Torres", url: "#" },
    { boleto: 5, nombre_completo: "Luis Rivas", url: "#" },
    { boleto: 6, nombre_completo: "Sofía Hernández", url: "#" },
    { boleto: 7, nombre_completo: "Diego Martínez", url: "#" },
    { boleto: 8, nombre_completo: "Elena Díaz", url: "#" }
  ];

  const wheel = document.getElementById('wheel');
  const segmentsGroup = document.getElementById('segmentsGroup');
  const tickGroup = document.getElementById('tickGroup');
  const hub = document.getElementById('hub');
  const btnSortear = document.getElementById('btnSortear');
  const inpN = document.getElementById('inpN');
  const tb = document.getElementById('tbGanadores');
  const box = document.getElementById('boxGanadores');
  
  let rot = 0;

  /* --- DIBUJAR RULETA ESTILO IMAGEN (RESTAURADO) --- */
  function drawWheel() {
    const segments = 10;
    // Colores pastel exactos de la imagen
    const colors = ['#fbc2eb','#a18cd1','#ffe29a','#ff9a8b','#20e3b2','#7cffcb','#6ba4ff','#ffd166','#ff6f91','#2b82ff'];
    
    // 1. Dibujar Segmentos de Color
    for (let i = 0; i < segments; i++) {
      const angle = 360 / segments;
      const startAngle = i * angle;
      const endAngle = (i + 1) * angle;
      
      const x1 = 50 + 50 * Math.cos(Math.PI * (startAngle - 90) / 180);
      const y1 = 50 + 50 * Math.sin(Math.PI * (startAngle - 90) / 180);
      const x2 = 50 + 50 * Math.cos(Math.PI * (endAngle - 90) / 180);
      const y2 = 50 + 50 * Math.sin(Math.PI * (endAngle - 90) / 180);

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M 50 50 L ${x1} ${y1} A 50 50 0 0 1 ${x2} ${y2} Z`);
      path.setAttribute("fill", colors[i]);
      segmentsGroup.appendChild(path);
    }

    // 2. Dibujar Ticks (60 líneas como en el código robusto que enviaste)
    for (let i = 0; i < 60; i++) {
      const angle = (i * 360 / 60) * Math.PI / 180;
      const isLarge = i % 6 === 0; // Cada segmento tiene un radio principal
      
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      const rOut = 48; // Ligeramente más adentro del borde para el clipPath
      const rIn = isLarge ? 34 : 40; // Los grandes van más adentro
      
      line.setAttribute("x1", 50 + rOut * Math.cos(angle));
      line.setAttribute("y1", 50 + rOut * Math.sin(angle));
      line.setAttribute("x2", 50 + rIn * Math.cos(angle));
      line.setAttribute("y2", 50 + rIn * Math.sin(angle));
      line.setAttribute("stroke", "white");
      line.setAttribute("stroke-width", isLarge ? "1.8" : "1"); // Grosor del código robusto
      line.setAttribute("stroke-linecap", "round");
      line.setAttribute("stroke-opacity", isLarge ? "0.95" : "0.6");
      tickGroup.appendChild(line);
    }
  }

  drawWheel();

  /* --- LÓGICA DE SORTEO (Manteniendo tu funcionalidad) --- */
  async function sortear() {
    const n = parseInt(inpN.value, 10) || 1;
    btnSortear.disabled = true;
    box.style.display = 'none';
    hub.textContent = "Girando...";

    // 1. Determinar ganador
    let pool = [...participantes];
    const ganadores = [];
    if (BOLETO_GANADOR_FORZADO) {
      const idx = pool.findIndex(p => p.boleto == BOLETO_GANADOR_FORZADO);
      if (idx !== -1) ganadores.push(pool.splice(idx, 1)[0]);
    }
    while (ganadores.length < n && pool.length > 0) {
      ganadores.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
    }

    // 2. Calcular giro (Apuntando al primer ganador)
    const winningSegmentIdx = ganadores[0] ? (parseInt(ganadores[0].boleto) % 10) : 0;
    const extraTurns = 5 + Math.random() * 5;
    const segmentDeg = 360 / 10;
    // Ajuste para que la aguja (arriba) caiga en el segmento
    const targetDeg = (360 - (winningSegmentIdx * segmentDeg) - (segmentDeg / 2));
    
    rot += (extraTurns * 360) + targetDeg;
    wheel.style.transform = `rotate(${rot}deg)`;

    setTimeout(() => {
      hub.textContent = "¡LISTO!";
      tb.innerHTML = ganadores.map((g, i) => `
        <tr>
          <td>${i+1}</td>
          <td><strong>${String(g.boleto).padStart(5,'0')}</strong></td>
          <td>${g.nombre_completo}</td>
        </tr>
      `).join('');
      box.style.display = 'block';
      btnSortear.disabled = false;
    }, 4100);
  }

  btnSortear.addEventListener('click', sortear);
})();
</script>

</body>
</html>
