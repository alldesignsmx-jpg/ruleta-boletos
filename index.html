<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Boletos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script> <!-- Incluir librería SheetJS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f7f7f7;
            padding: 50px;
        }

        #ruleta {
            margin: 20px;
            font-size: 24px;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: #fff;
            display: inline-block;
            font-weight: bold;
            color: #333;
        }

        #boton {
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #boton:hover {
            background-color: #45a049;
        }

        #resultado {
            margin-top: 30px;
            font-size: 26px;
            color: #FF5733;
            font-weight: bold;
        }

        #input-file {
            margin-top: 20px;
        }

        #input-boletos {
            margin-top: 20px;
            font-size: 18px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Ruleta de Boletos</h1>
    <div id="ruleta">
        ¡Haz clic en "Ruletazo" para elegir un boleto ganador!
    </div>
    <br>
    <button id="boton">Ruletazo</button>
    <div id="resultado"></div>
    
    <!-- Input para cargar el archivo Excel -->
    <input type="file" id="input-file" accept=".xlsx, .xls" />
    
    <!-- Input para seleccionar un número específico de boleto -->
    <br>
    <input type="number" id="input-boletos" placeholder="Número de boleto a ganar" />

    <script>
        let boletos_vendidos = [];

        // Función para cargar el archivo Excel
        document.getElementById("input-file").addEventListener("change", function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                // Obtener la primera hoja del archivo Excel
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];

                // Convertir la hoja a formato JSON
                const data_json = XLSX.utils.sheet_to_json(worksheet);
                
                // Suponemos que los boletos están en una columna llamada 'Boleto'
                boletos_vendidos = data_json.map(row => row.Boleto);  // Modifica 'Boleto' si tu columna tiene otro nombre

                // Mostrar los boletos en consola (opcional)
                console.log(boletos_vendidos);
            };
            
            reader.readAsArrayBuffer(file);
        });

        // Función que se ejecuta al hacer clic en el botón
        document.getElementById("boton").addEventListener("click", function() {
            const boleto_especifico = document.getElementById("input-boletos").value;

            if (boletos_vendidos.length === 0) {
                alert("Por favor, carga primero un archivo Excel con los boletos.");
                return;
            }

            if (boleto_especifico) {
                // Buscar el boleto específico en la lista
                const boleto_ganador = boletos_vendidos.find(boleto => boleto === boleto_especifico);

                if (boleto_ganador) {
                    document.getElementById("resultado").textContent = `¡El boleto ganador es: ${boleto_ganador}!`;
                } else {
                    document.getElementById("resultado").textContent = `El boleto ${boleto_especifico} no está en la lista.`;
                }
            } else {
                // Si no se ingresó un boleto específico, se elige aleatoriamente
                const boleto_ganador = boletos_vendidos[Math.floor(Math.random() * boletos_vendidos.length)];
                document.getElementById("resultado").textContent = `¡El boleto ganador es: ${boleto_ganador}!`;
            }
        });
    </script>
</body>
</html>
