<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Ruletazo — Diseño Idéntico con Enlaces</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root { --bg: #0f1020; --pink: #ff5f9a; --cyan: #00ffff; }
  body { 
    margin: 0; min-height: 100vh; background: var(--bg); color: white;
    display: flex; justify-content: center; align-items: center; font-family: sans-serif;
  }
  .panel { position: relative; width: 550px; height: 550px; display: flex; justify-content: center; align-items: center; }
  
  /* Aguja */
  .needle {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
    border-top: 30px solid var(--pink); z-index: 100; filter: drop-shadow(0 0 10px var(--pink));
  }

  .wheel-container { position: relative; width: 100%; height: 100%; border-radius: 50%; overflow: hidden; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
  
  /* Fondo de colores idéntico a la imagen */
  .colors {
    position: absolute; inset: 0; z-index: 1;
    background: conic-gradient(
      #2b82ff 0deg 36deg,   #ff6f91 36deg 72deg, #ffd166 72deg 108deg, #6ba4ff 108deg 144deg,
      #7cffcb 144deg 180deg, #ff9a8b 180deg 216deg, #ffe29a 216deg 252deg, #a18cd1 252deg 288deg,
      #fbc2eb 288deg 324deg, #20e3b2 324deg 360deg
    );
  }

  .ticks-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; }

  .hub {
    position: absolute; width: 130px; height: 130px; border-radius: 50%; z-index: 10;
    background: radial-gradient(circle at 30% 30%, #fff, #00e5ff 75%, #0047ff 100%);
    display: flex; justify-content: center; align-items: center; font-weight: 900;
    color: #000; text-transform: uppercase; font-size: 0.8rem; text-align: center;
    box-shadow: 0 0 30px var(--cyan);
  }

  .sidebar { position: absolute; right: -380px; width: 340px; background: #141832; padding: 20px; border-radius: 15px; }
  .btn-sortear { background: #7cffcb; color: #000; font-weight: 800; border-radius: 50px; width: 100%; border: none; padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<div class="panel">
  <div class="needle"></div>
  <div class="wheel-container" id="wheel">
    <div class="colors"></div>
    <svg class="ticks-svg" viewBox="0 0 100 100">
      <defs>
        <clipPath id="ringClip"><path d="M 50 50 m -46 0 a 46 46 0 1 0 92 0 a 46 46 0 1 0 -92 0 M 50 50 m -36 0 a 36 36 0 1 1 72 0 a 36 36 0 1 1 -72 0" fill-rule="evenodd"></path></clipPath>
        <filter id="tickGlow"><feDropShadow dx="0" dy="0" stdDeviation="0.8" flood-color="#00FFFF"/></filter>
      </defs>
      <g clip-path="url(#ringClip)" filter="url(#tickGlow)" id="tickGroup"></g>
    </svg>
  </div>
  <div class="hub">Felicidades</div>

  <div class="sidebar">
    <h5 class="text-center">Generar Ganador</h5>
    <input type="number" id="qty" class="form-control mb-2" value="1">
    <button class="btn-sortear" id="btnSpin">SORTEAR AHORA</button>
    
    <div id="resArea" class="mt-4" style="display:none;">
      <table class="table table-dark table-sm align-middle">
        <thead><tr><th>Boleto</th><th>Nombre</th><th></th></tr></thead>
        <tbody id="resList"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
(() => {
  // GANADOR MANUAL FORZADO
  const BOLETO_GANADOR_FORZADO = '00101';

  const participantes = [
    { boleto: '00101', nombre: "Alexis Valentín García González", url: "https://www.rifasyumai.com/c0236-boleto" },
    { boleto: '00002', nombre: "María López", url: "#" },
    { boleto: '00045', nombre: "Juan Pérez", url: "#" }
  ];

  const wheel = document.getElementById('wheel');
  const tickGroup = document.getElementById('tickGroup');
  let currentRotation = 0;

  // Dibujar los 60 ticks del SVG para que sea idéntico
  for(let i=0; i<60; i++) {
    const angle = (i * 6) * (Math.PI / 180);
    const isMajor = i % 6 === 0;
    const x1 = 50 + 46 * Math.cos(angle);
    const y1 = 50 + 46 * Math.sin(angle);
    const x2 = 50 + (isMajor ? 32 : 35) * Math.cos(angle);
    const y2 = 50 + (isMajor ? 32 : 35) * Math.sin(angle);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
    line.setAttribute("stroke", "white");
    line.setAttribute("stroke-width", isMajor ? "1.5" : "0.8");
    tickGroup.appendChild(line);
  }

  document.getElementById('btnSpin').addEventListener('click', function() {
    this.disabled = true;
    const ganador = participantes.find(p => p.boleto === BOLETO_GANADOR_FORZADO);
    
    // Cálculo para que caiga en el segmento correcto (basado en el último dígito del boleto)
    const segmentIndex = parseInt(BOLETO_GANADOR_FORZADO.slice(-1)); 
    const stopAngle = 360 - (segmentIndex * 36) - 18;
    currentRotation += (360 * 10) + stopAngle;

    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      document.getElementById('resArea').style.display = 'block';
      // AQUÍ SE RESTAURA EL BOTÓN "VER" CON EL ENLACE CORRECTO
      document.getElementById('resList').innerHTML = `
        <tr>
          <td>${ganador.boleto}</td>
          <td style="font-size: 0.85rem;">${ganador.nombre}</td>
          <td><a href="${ganador.url}" target="_blank" class="btn btn-primary btn-sm">Ver</a></td>
        </tr>`;
      this.disabled = false;
    }, 5000);
  });
})();
</script>
</body>
</html>
