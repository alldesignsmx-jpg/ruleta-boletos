<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Boletos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script> <!-- Incluir librería SheetJS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 50px;
        }

        #ruleta-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border-radius: 50%;
            border: 8px solid #000;
            background: #fff;
        }

        .boletos {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform-origin: center;
        }

        .boletos div {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 100%;
            font-size: 16px;
            font-weight: bold;
            transform-origin: 50% 100%;
        }

        #boton {
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #boton:hover {
            background-color: #45a049;
        }

        #resultado {
            margin-top: 20px;
            font-size: 24px;
            color: #FF5733;
            font-weight: bold;
        }

        #input-boletos {
            margin-top: 20px;
            font-size: 18px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Ruleta de Boletos</h1>
    
    <!-- Ruleta gráfica -->
    <div id="ruleta-container">
        <div id="boletos" class="boletos">
            <!-- Aquí se agregarán los segmentos de boletos -->
        </div>
    </div>

    <br>
    <button id="boton">¡Girar la Ruleta!</button>
    <div id="resultado"></div>

    <script>
        let boletos_vendidos = [];

        // URL del archivo Excel en el repositorio de GitHub
        const archivoURL = "https:///raw.githubusercontent.com/alldesignsmx-jpg/ruleta-boletos/blob/main/datos.xlsx";  // Cambia la URL por la correcta

        // Función para cargar el archivo Excel desde GitHub
        fetch(archivoURL)
            .then(response => response.arrayBuffer())
            .then(data => {
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const data_json = XLSX.utils.sheet_to_json(worksheet);
                boletos_vendidos = data_json.filter(row => row.Estatus === "Pagado").map(row => row.Boleto);

                // Mostrar los boletos cargados en la consola (opcional)
                console.log(boletos_vendidos);

                // Crear los segmentos en la ruleta
                const boletosDiv = document.getElementById("boletos");
                const angleStep = 360 / boletos_vendidos.length;

                boletos_vendidos.forEach((boleto, index) => {
                    const angle = angleStep * index;
                    const div = document.createElement('div');
                    div.style.transform = `rotate(${angle}deg)`;
                    div.innerHTML = boleto;
                    boletosDiv.appendChild(div);
                });
            });

        // Función para girar la ruleta al hacer clic en el botón
        document.getElementById("boton").addEventListener("click", function() {
            const boleto_especifico = document.getElementById("input-boletos") ? document.getElementById("input-boletos").value : "003"; // Número de boleto fijo o el ingresado por el usuario

            if (boletos_vendidos.length === 0) {
                alert("No se han cargado boletos.");
                return;
            }

            // Si se especifica un número de boleto, buscarlo en la lista
            const boleto_ganador = boletos_vendidos.find(boleto => boleto === boleto_especifico);

            if (boleto_ganador) {
                document.getElementById("resultado").textContent = `¡El boleto ganador es: ${boleto_ganador}!`;
            } else {
                document.getElementById("resultado").textContent = `El boleto ${boleto_especifico} no está en la lista.`;
            }

            // Girar la ruleta (agregar animación)
            const ruleta = document.getElementById("boletos");
            const girar = 360 * 5 + Math.random() * 360;  // Girar varias veces más un giro extra aleatorio
            ruleta.style.transition = "transform 4s ease-out";
            ruleta.style.transform = `rotate(${girar}deg)`;
        });
    </script>
</body>
</html>
