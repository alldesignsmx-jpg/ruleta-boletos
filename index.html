<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ruletazo — Diseño Idéntico</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root {
    --bg-dark: #0f1020;
    --accent-pink: #ff5f9a;
  }

  body {
    margin: 0;
    min-height: 100dvh;
    background: radial-gradient(circle at center, #1a1c3a 0%, #0f1020 100%);
    color: #e9f2ff;
    font-family: 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .panel {
    position: relative;
    width: 600px;
    height: 600px;
    background: #0a0c1a;
    border-radius: 50%;
    box-shadow: 0 0 100px rgba(0, 255, 255, 0.15), inset 0 0 20px rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    border: 12px solid #141832;
  }

  /* Indicador (Aguja) */
  .needle {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 30px solid var(--accent-pink);
    z-index: 100;
    filter: drop-shadow(0 0 10px var(--accent-pink));
  }

  /* La Rueda */
  .wheel {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    transition: transform 4.5s cubic-bezier(0.15, 0, 0.15, 1);
  }

  /* Capa de Colores Pastel de Fondo */
  .wheel-colors {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: conic-gradient(
      #2b82ff 0deg 36deg,   #ff6f91 36deg 72deg, 
      #ffd166 72deg 108deg, #6ba4ff 108deg 144deg,
      #7cffcb 144deg 180deg, #ff9a8b 180deg 216deg,
      #ffe29a 216deg 252deg, #a18cd1 252deg 288deg,
      #fbc2eb 288deg 324deg, #20e3b2 324deg 360deg
    );
  }

  /* SVG de Ticks que proporcionaste */
  .ticks-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }

  .hub {
    position: absolute;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle at 30% 30%, #fff, #c6f8ff 40%, #00e5ff 75%, #0047ff 100%);
    border-radius: 50%;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 900;
    color: #000;
    text-transform: uppercase;
    font-size: 0.9rem;
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
    text-align: center;
    border: 4px solid rgba(0,0,0,0.1);
  }

  .controls {
    position: absolute;
    right: -350px;
    width: 300px;
    background: rgba(20, 24, 50, 0.9);
    padding: 25px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-sortear {
    width: 100%;
    background: linear-gradient(180deg, #caffbf, #7cffcb);
    border: none;
    padding: 12px;
    border-radius: 50px;
    font-weight: 800;
    color: #0a0c1a;
    margin-top: 15px;
  }
</style>
</head>
<body>

  <div class="panel">
    <div class="needle"></div>
    
    <div class="wheel" id="wheel">
      <div class="wheel-colors"></div>
      
      <svg class="ticks-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <clipPath id="ringClip">
            <path d="M 50 50 m -46 0 a 46 46 0 1 0 92 0 a 46 46 0 1 0 -92 0 M 50 50 m -36 0 a 36 36 0 1 1 72 0 a 36 36 0 1 1 -72 0" fill-rule="evenodd"></path>
          </clipPath>
          <filter id="tickGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="0" stdDeviation="0.8" flood-color="#000" flood-opacity="0.8"></feDropShadow>
            <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#00FFFF" flood-opacity="0.6"></feDropShadow>
          </filter>
        </defs>
        <g clip-path="url(#ringClip)" filter="url(#tickGlow)" id="tickGroup">
          <line x1="96.000" y1="50.000" x2="82.500" y2="50.000" stroke="white" stroke-linecap="round" stroke-opacity="0.95" stroke-width="1.8"></line>
          </g>
      </svg>
    </div>

    <div class="hub" id="hub">FELICIDADES</div>

    <div class="controls">
      <h4 class="text-center mb-3">Sorteo Especial</h4>
      <input type="number" id="inpN" class="form-control mb-2" value="1">
      <button class="btn-sortear" id="btnSortear">SORTEAR AHORA</button>
      
      <div id="resultado" class="mt-4" style="display:none;">
        <table class="table table-dark table-sm">
          <thead><tr><th>#</th><th>Boleto</th><th>Ganador</th></tr></thead>
          <tbody id="listaGanadores"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
(() => {
  // CONFIGURACIÓN GANADOR MANUAL
  const BOLETO_GANADOR_FORZADO = '00101'; 

  const participantes = [
    { boleto: '00001', nombre: "Juan Pérez" },
    { boleto: '00101', nombre: "Alexis Valentín García González" }, // EL GANADOR
    { boleto: '00020', nombre: "María López" },
    { boleto: '00065', nombre: "Sofía Hernández" }
  ];

  const wheel = document.getElementById('wheel');
  const btn = document.getElementById('btnSortear');
  const lista = document.getElementById('listaGanadores');
  let rotacionActual = 0;

  // Llenar los ticks restantes del SVG (para que se vea idéntico a tu código)
  const tickGroup = document.getElementById('tickGroup');
  const totalTicks = 60;
  tickGroup.innerHTML = '';
  for(let i=0; i<totalTicks; i++) {
    const angle = (i * 360 / totalTicks) * (Math.PI / 180);
    const isMajor = i % 6 === 0;
    const x1 = 50 + 46 * Math.cos(angle);
    const y1 = 50 + 46 * Math.sin(angle);
    const x2 = 50 + (isMajor ? 32.5 : 34.8) * Math.cos(angle);
    const y2 = 50 + (isMajor ? 32.5 : 34.8) * Math.sin(angle);
    
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x1); line.setAttribute("y1", y1);
    line.setAttribute("x2", x2); line.setAttribute("y2", y2);
    line.setAttribute("stroke", "white");
    line.setAttribute("stroke-width", isMajor ? "1.8" : "1.2");
    line.setAttribute("stroke-opacity", isMajor ? "0.95" : "0.6");
    line.setAttribute("stroke-linecap", "round");
    tickGroup.appendChild(line);
  }

  btn.addEventListener('click', () => {
    btn.disabled = true;
    document.getElementById('resultado').style.display = 'none';

    // 1. Buscamos al ganador forzado
    const ganador = participantes.find(p => p.boleto === BOLETO_GANADOR_FORZADO);
    
    // 2. Cálculo de rotación
    // El boleto 00101 termina en 1. Mapeamos a segmento 1 (Rosa fuerte)
    const numBoleto = parseInt(BOLETO_GANADOR_FORZADO);
    const segmentCount = 10;
    const winningSegmentIdx = numBoleto % segmentCount; 
    
    const gradosPorSegmento = 360 / segmentCount;
    // Ajuste para que la aguja (arriba) caiga en el centro del segmento
    const stopAt = (360 - (winningSegmentIdx * gradosPorSegmento) - (gradosPorSegmento / 2));
    
    const vueltasExtra = 10 * 360; 
    rotacionActual += vueltasExtra + stopAt;

    wheel.style.transform = `rotate(${rotacionActual}deg)`;

    setTimeout(() => {
      document.getElementById('resultado').style.display = 'block';
      lista.innerHTML = `<tr><td>1</td><td><strong>${ganador.boleto}</strong></td><td>${ganador.nombre}</td></tr>`;
      btn.disabled = false;
    }, 4500);
  });
})();
</script>
</body>
</html>
