<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Boletos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #1e1e2f;
            color: white;
            padding: 50px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        #ruleta-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
            border-radius: 50%;
            border: 8px solid #000;
            background: #fff;
            color: #000;
        }

        .boletos {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform-origin: center;
        }

        .boletos div {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 1.5;
            font-size: 16px;
            font-weight: bold;
            transform-origin: 50% 100%;
            color: white;
        }

        #boton {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #boton:hover {
            background-color: #45a049;
        }

        #resultado {
            margin-top: 20px;
            font-size: 24px;
            color: #FF5733;
            font-weight: bold;
        }

        #input-boletos {
            width: 80%;
            margin: 20px auto;
            padding: 10px;
            font-size: 16px;
            color: #333;
        }

        #boletos-lista {
            font-size: 16px;
            margin-top: 20px;
        }

        #boletos-lista textarea {
            width: 80%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        #input-ganador {
            width: 80%;
            margin-top: 20px;
            padding: 10px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Ruleta de Boletos</h1>

    <div id="ruleta-container">
        <div id="boletos" class="boletos">
            <!-- Aquí se agregarán los segmentos de boletos -->
        </div>
    </div>

    <br>
    <input type="text" id="input-boletos" placeholder="Ingresa los boletos (separados por comas)" />

    <br>
    <input type="text" id="input-ganador" placeholder="0003" />

    <br>
    <button id="boton">¡Girar la Ruleta!</button>
    <div id="resultado"></div>

    <div id="boletos-lista">
        <h3>Lista de boletos:</h3>
        <textarea id="boletos-textarea" readonly></textarea>
    </div>

    <script>
        let boletos_vendidos = [];

        // Función para agregar los boletos a la ruleta
        function agregarBoletos() {
            const boletosTexto = document.getElementById("input-boletos").value;
            boletos_vendidos = boletosTexto.split(",").map(boleto => boleto.trim());

            // Mostrar los boletos en el área de lista
            document.getElementById("boletos-textarea").value = boletos_vendidos.join("\n");

            // Crear los segmentos en la ruleta
            const boletosDiv = document.getElementById("boletos");
            boletosDiv.innerHTML = '';  // Limpiar la ruleta antes de agregar nuevos boletos
            const angleStep = 360 / boletos_vendidos.length;

            boletos_vendidos.forEach((boleto, index) => {
                const angle = angleStep * index;
                const div = document.createElement('div');
                div.style.transform = `rotate(${angle}deg)`;
                div.innerHTML = boleto;
                boletosDiv.appendChild(div);
            });
        }

        // Función para girar la ruleta al hacer clic en el botón
        document.getElementById("boton").addEventListener("click", function() {
            if (boletos_vendidos.length === 0) {
                alert("Por favor, ingresa los boletos.");
                return;
            }

            // Obtener el boleto específico si se ha ingresado
            const boleto_especifico = document.getElementById("input-ganador").value;
            let boleto_ganador;

            if (boleto_especifico) {
                // Si se ha especificado un boleto
                boleto_ganador = boletos_vendidos.find(boleto => boleto === boleto_especifico);

                if (!boleto_ganador) {
                    document.getElementById("resultado").textContent = `El boleto ${boleto_especifico} no está en la lista.`;
                    return;
                }
            } else {
                // Si no se ha especificado, elegir un boleto aleatorio
                boleto_ganador = boletos_vendidos[Math.floor(Math.random() * boletos_vendidos.length)];
            }

            // Girar la ruleta (agregar animación)
            const ruleta = document.getElementById("boletos");
            const girar = 360 * 5 + Math.random() * 360;  // Girar varias veces más un giro extra aleatorio
            ruleta.style.transition = "transform 4s ease-out";
            ruleta.style.transform = `rotate(${girar}deg)`;

            // Mostrar el boleto ganador después de la animación
            setTimeout(() => {
                document.getElementById("resultado").textContent = `¡El boleto ganador es: ${boleto_ganador}!`;
            }, 4000);
        });

        // Llamar a agregarBoletos cuando se ingrese un boleto
        document.getElementById("input-boletos").addEventListener("input", agregarBoletos);
    </script>
</body>
</html>
