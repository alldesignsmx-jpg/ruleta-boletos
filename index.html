<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ruletazo — Azar y Riesgo (Bootstrap)</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root{ --bg-1:#0f1020; --bg-2:#1a1c3a; --glow:#66f4ff; --accent:#ff5f9a; }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100dvh; display:flex; align-items:flex-start;
    background: radial-gradient(1200px 800px at 70% -20%, #2a2e75 0%, transparent 60%),
                radial-gradient(1000px 600px at -10% 120%, #3b1a4f 0%, transparent 60%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
    color:#e9f2ff; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Arial,sans-serif;
  }

  /* Contenedor principal */
  .page-wrap{ width:100%; padding:32px 16px 40px; }
  @media (min-width:992px){ .page-wrap{ padding-top:48px; } }

  h1{
    font-weight:800; 
    letter-spacing:.5px; 
    margin:6px 0 0 0; 
    text-align:center;
    background:linear-gradient(90deg, #fff, #a7f0ff 40%, #ffa6d1 60%, #fff);
    -webkit-background-clip:text; 
    background-clip:text; 
    color:transparent;
    text-shadow:0 0 18px #60f, 0 0 28px #0ff3;
    text-transform:uppercase;
  }
  .sub{ text-align:center; opacity:.85; margin-bottom:22px; }

  /* Panel (ruleta) */
  .panel{
    position:relative; width:100%; max-width:720px; aspect-ratio:1/1;
    border-radius:28px; padding:22px; margin-inline:auto;
    background:
      radial-gradient(circle at 50% 30%, #2df 0 2px, transparent 60px),
      radial-gradient(120% 120% at 80% 10%, #ffffff08 0%, transparent 50%),
      linear-gradient(180deg, #0a0c1a, #141832);
    box-shadow: inset 0 0 0 1px #ffffff18, 0 30px 60px #0008, 0 0 120px #0ff2;
    display:grid; place-items:center;
  }
  .needle{
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-top:26px solid var(--accent);
    filter:drop-shadow(0 0 8px #ff5f9a88) drop-shadow(0 0 18px #ff5f9acc);
    z-index:4;
  }
  .wheel{
    --rot:0turn;
    width:100%; height:100%; border-radius:50%;
    position:relative; display:grid; place-items:center;
    transform:rotate(var(--rot));
    transition:transform cubic-bezier(.2,.9,.15,1);
    background:
      conic-gradient(from 0turn,
        #20e3b2 0 10%, #2b82ff 10% 20%, #ff6f91 20% 30%, #ffd166 30% 40%,
        #6ba4ff 40% 50%, #7cffcb 50% 60%, #ff9a8b 60% 70%, #ffe29a 70% 80%,
        #a18cd1 80% 90%, #fbc2eb 90% 100%);
    box-shadow: inset 0 0 0 10px #0008, inset 0 0 0 2px #fff4, 0 0 0 12px #00ffff18;
    overflow:hidden;
  }
  .ticks-svg{
    position:absolute; 
    inset:-3%; 
    filter: drop-shadow(0 0 4px #ffffffff);
    /*filter: drop-shadow(0 0 4px #000) drop-shadow(0 0 8px #0ff);*/
    z-index:2; pointer-events:none;
  }
  .hub{
    width:26%; aspect-ratio:1/1; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff, #c6f8ff 45%, #00e5ff 70%, #0047ff 100%);
    box-shadow:inset 0 0 0 6px #00000055, 0 0 40px var(--glow), 0 0 90px #00fff488;
    display:grid; place-items:center; font-weight:900; color:#001; letter-spacing:.5px; text-transform:uppercase;
    z-index:3;
    font-size: clamp(0.5rem, 2vw, 1rem);
    padding: 8px;
    text-align: center;
    word-break: break-word;
    line-height: 1.1;
  }
  .burst{ position:absolute; inset:-10% -10%; pointer-events:none; overflow:visible; z-index:5; }
  .spark{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle, #fff 30%, #0ff 70%, transparent 72%);
    filter:blur(.2px) drop-shadow(0 0 6px #0ff) drop-shadow(0 0 18px #0ff);
    opacity:0; transform:translate(-50%,-50%) scale(.4);
    animation:none;
  }
  @keyframes fly {
    0%{opacity:0; transform:translate(var(--x0),var(--y0)) scale(.4)}
    8%{opacity:1}
    70%{opacity:1}
    100%{opacity:0; transform:translate(var(--x1),var(--y1)) scale(0)}
  }

  /* Botones / acciones */
  .btn-neo{
    padding:12px 18px; border:none; border-radius:999px; cursor:pointer; font-weight:800;
    color:#0a0c1a; background:linear-gradient(180deg, #e8fbff, #bff2ff);
    box-shadow: 0 10px 24px #00ffff22, inset 0 0 0 2px #ffffffaa, inset 0 -6px 14px #00ffff33;
    transition:transform .1s ease, box-shadow .2s ease, filter .2s ease;
  }
  .btn-neo:hover{ transform:translateY(-1px); filter:saturate(1.2) }
  .btn-neo:active{ transform:translateY(0); box-shadow:0 6px 16px #00ffff22, inset 0 0 0 2px #fff }
  .start{ background:linear-gradient(180deg, #caffbf, #7cffcb); }
  .pause{ background:linear-gradient(180deg, #ffe8a3, #ffd166); }
  .stop { background:linear-gradient(180deg, #ffb3c7, #ff6f91); color:#280010; }

  .result{ min-height:28px; font-weight:700; letter-spacing:.3px; text-shadow:0 0 14px #0ff6; }
  .card-like{
    background: linear-gradient(180deg, #0a0c1a, #141832);
    border-radius:24px; padding:20px;
    box-shadow: inset 0 0 0 1px #ffffff18, 0 10px 30px #0006, 0 0 60px #00ffff22;
  }
  
  /* Input personalizado para número de ganadores */
  #inpN {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 0.6rem;
    -moz-appearance: textfield; /* Firefox */
  }
  #inpN::-webkit-outer-spin-button,
  #inpN::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

</style>
</head>
<body>
  <div id="ruletaApp"
      data-tabla="rifa_003"
      data-digitos="5">
  </div>
  <div class="page-wrap container">
    <h1>R U L E T A Z O<br>Kenworth AeroCab T660 (2015)</h1>
    <p class="sub">Inicia la jugada y deja que el destino elija. Pausa o detén con inercia para ver el resultado.</p>

    <div class="row g-4 align-items-start">
      <!-- Columna RUEDA -->
      <div class="col-12 col-lg-6">
        <div class="panel">
          <div class="needle"></div>
          <div class="wheel" id="wheel">
            <!-- Ticks SVG robustos -->
            <svg class="ticks-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <defs>
                <clipPath id="ringClip">
                  <!-- anillo: radio 46 externo y 36 interno -->
                  <path d="
                    M 50 50
                    m -46 0
                    a 46 46 0 1 0 92 0
                    a 46 46 0 1 0 -92 0
                    M 50 50
                    m -36 0
                    a 36 36 0 1 1 72 0
                    a 36 36 0 1 1 -72 0
                    " fill-rule="evenodd"/>
                </clipPath>
                <filter id="tickGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feDropShadow dx="0" dy="0" stdDeviation="0.8" flood-color="#000" flood-opacity="0.8"/>
                  <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#00FFFF" flood-opacity="0.6"/>
                </filter>
              </defs>
              <g clip-path="url(#ringClip)" filter="url(#tickGlow)" id="tickGroup"></g>
            </svg>
            <div class="hub" id="hub">RESULTADO</div>
          </div>
          <div class="burst" id="burst"></div>
        </div>
      </div>

      <!-- Columna ACCIONES -->
      <div class="col-12 col-lg-6">
        <div class="card-like h-100 d-flex flex-column justify-content-between">
          <div class="mt-1">
            <h3 class="mb-3 text-center">Generar Ganadores</h3>  
            <div class="row g-2 align-items-center">
              <div class="col-7 col-md-6">
                <input type="number" min="1" value="1" class="form-control form-control-sm" id="inpN" placeholder="Cantidad de ganadores">
              </div>
              <div class="col-5 col-md-6 d-grid">
                <button class="btn-neo start" id="btnSortear">Sortear ahora</button>
              </div>
            </div>

            <div class="table-responsive mt-3" id="boxGanadores" style="display:none;">
              <table class="table table-sm table-dark table-striped align-middle mb-0">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Boleto</th>
                    <th>Nombre</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="tbGanadores"></tbody>
              </table>
              <div class="small text-white-50 mt-1" id="metaGanadores"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

<!-- Bootstrap JS (opcional para utilidades) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>
(() => {
  /* ========= CONFIG ========= */
  const SORTEO_URL = '/themes/theme_01/core/ruleta/sorteo_ganadores.php';  // <- cambia si tu endpoint está en otra ruta
  const app = document.getElementById('ruletaApp');
  const tabla   = app?.dataset?.tabla || 'boletos';
  const digitos = parseInt(app?.dataset?.digitos || '0', 10);

  // Formatea sólo si son dígitos puros; respeta strings que ya traen ceros
  function formatearBoleto(b) {
    let s = String(b).trim();
    if (digitos > 0 && /^\d+$/.test(s)) {
      s = s.padStart(digitos, '0');
    }
    return s;
  }

  /* ========= Segmentos (visuales) =========
     Son solo “slots” de parada visual. El texto real del ganador
     vendrá del endpoint. */
  const segments = new Array(10).fill(0).map((_,i)=>({ label:`Slot ${i+1}`, weight:1 }));

  /* ========= DOM base (ruleta) ========= */
  const wheel  = document.getElementById('wheel');
  const hub    = document.getElementById('hub');
  const burst  = document.getElementById('burst');

  /* ========= DOM sorteo (UI derecha) ========= */
  const btnSortear = document.getElementById('btnSortear');
  const inpN = document.getElementById('inpN');
  const box = document.getElementById('boxGanadores');
  const tb  = document.getElementById('tbGanadores');
  const meta= document.getElementById('metaGanadores');

  /* ========= Ticks SVG (si no existen) ========= */
  const tickGroup = document.getElementById('tickGroup');
  if (tickGroup && tickGroup.childElementCount === 0) {
    const TOTAL=60, R_OUT=46, R_IN_LONG=32.5, R_IN_SHORT=35.0;
    for(let i=0;i<TOTAL;i++){
      const angle=(360/TOTAL)*i * Math.PI/180, c=Math.cos(angle), s=Math.sin(angle);
      const isLong=(i%5===0), rIn=isLong?R_IN_LONG:R_IN_SHORT;
      const x1=50+c*R_OUT, y1=50+s*R_OUT, x2=50+c*rIn, y2=50+s*rIn;
      const L=document.createElementNS('http://www.w3.org/2000/svg','line');
      L.setAttribute('x1',x1.toFixed(3)); L.setAttribute('y1',y1.toFixed(3));
      L.setAttribute('x2',x2.toFixed(3)); L.setAttribute('y2',y2.toFixed(3));
      L.setAttribute('stroke','white'); L.setAttribute('stroke-linecap','round');
      L.setAttribute('stroke-opacity', isLong?'0.95':'0.6'); L.setAttribute('stroke-width', isLong?'1.8':'1.2');
      tickGroup.appendChild(L);
    }
  }

  /* ========= Sonido sencillo ========= */
  let audioCtx;
  function blip(freq=880, dur=0.05, type='triangle'){
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq; g.gain.value = 0.15;
      o.connect(g); g.connect(audioCtx.destination); o.start();
      setTimeout(()=>o.stop(), dur*1000);
    }catch(_){}
  }

  /* ========= Partículas ========= */
  function spawnBurst(n=24){
    for(let i=0;i<n;i++){
      const s=document.createElement('div'); s.className='spark';
      const x0=(wheel.clientWidth/2)+(Math.random()*40-20);
      const y0=(wheel.clientHeight/2)+(Math.random()*40-20);
      const a=Math.random()*Math.PI*2; const d=160+Math.random()*240;
      const x1=x0+Math.cos(a)*d, y1=y0+Math.sin(a)*d;
      s.style.setProperty('--x0',`${x0}px`); s.style.setProperty('--y0',`${y0}px`);
      s.style.setProperty('--x1',`${x1}px`); s.style.setProperty('--y1',`${y1}px`);
      const t=700+Math.random()*400; s.style.animation=`fly ${t}ms ease-out forwards`;
      burst.appendChild(s); setTimeout(()=>s.remove(), t+20);
    }
  }

  /* ========= Motor de giro ========= */
  let spinning=false, paused=false, rot=0, vel=0, rafId=null, last=performance.now();

  function render(){
    wheel.style.transition='transform .06s linear';
    wheel.style.setProperty('--rot', rot+'turn');
  }
  function step(now){
    const dt=(now-last)/1000; last=now;
    if(spinning && !paused){
      const target=1.7, accel=2.0;
      vel += (target-vel)*Math.min(1, accel*dt);
      rot += vel*dt;
      if(Math.random()<0.25) blip(1200,.02,'sine');
    }
    render(); rafId=requestAnimationFrame(step);
  }
  function startSpin(){
    if(spinning && !paused) return;
    spinning=true; paused=false; last=performance.now();
    blip(660,.06,'sawtooth'); spawnBurst(12);
    if(!rafId) rafId=requestAnimationFrame(step);
  }  
  function stopToIndex(idx, extraTurns=2.5){
    return new Promise((resolve) => { // Agregamos Promise
      if(!spinning) return resolve();
      paused=false;
      const segWidth  = 1 / segments.length;
      const segCenter = idx * segWidth + segWidth/2;
      const pointer   = 0;
      const fractional = rot - Math.floor(rot);
      let delta = (pointer - fractional - segCenter);
      delta = ((delta % 1) + 1) % 1;
      const targetRot = Math.floor(rot) + fractional + delta + extraTurns;

      const T = 2000 + Math.random()*600;
      wheel.style.transition = `transform ${T}ms cubic-bezier(.08,.9,.09,1.0)`;
      rot = targetRot; render();

      setTimeout(()=>{
        spinning=false; vel=0; rafId && cancelAnimationFrame(rafId); rafId=null;
        spawnBurst(36);
        blip(520,.06,'triangle'); 
        setTimeout(()=>blip(740,.06,'triangle'),80); 
        setTimeout(()=>blip(980,.06,'triangle'),160);
        resolve(); // Notificamos que la animación terminó
      }, T + 50);
    });
  }

  /* ========= Lógica de “Sortear ahora” con animación sincronizada ========= */
  async function sortear() {
    const n = parseInt(inpN.value, 10);
    if (!Number.isInteger(n) || n < 1) {
      alert('Especifica un número válido de ganadores.');
      return;
    }

    btnSortear.disabled = true;
    const oldTxt = btnSortear.textContent;
    btnSortear.textContent = 'Sorteando…';
    hub.textContent = "Girando..."; // Feedback visual en el centro

    try {
      // 1. Iniciamos el giro visual de inmediato
      startSpin();

      // 2. Ejecutamos la petición y un timer de seguridad (mínimo 2 segundos de giro) al mismo tiempo
      const fetchPromise = fetch(`${SORTEO_URL}?n=${encodeURIComponent(n)}&tabla=${encodeURIComponent(tabla)}`)
                            .then(res => res.json());
      const timerPromise = new Promise(res => setTimeout(res, 2000)); 

      // Esperamos a que AMBAS terminen
      const [data, _] = await Promise.all([fetchPromise, timerPromise]);

      if (!data.ok) throw new Error(data.error || 'Error al sortear');

      // 3. Ya tenemos los datos y pasó el tiempo mínimo. Calculamos el frenado.
      const forcedIdx = Math.floor(Math.random() * segments.length);
      const extraTurns = 2 + Math.random();

      // Esperamos a que la ruleta se detenga físicamente
      await stopToIndex(forcedIdx, extraTurns);

      // 4. AHORA mostramos los resultados en la interfaz
      const g0 = data.ganadores[0];
      //hub.textContent = formatearBoleto(g0.boleto); // Mostrar el primer ganador en el centro
      hub.textContent = formatearBoleto("Felicidades");

      tb.innerHTML = '';
      data.ganadores.forEach((g, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i+1}</td>
          <td><strong>${formatearBoleto(g.boleto)}</strong></td>
          <td>${g.nombre_completo}</td>
          <td><a href="${g.url}" target="_blank" class="btn btn-sm btn-primary">Ver</a></td>
        `;
        tb.appendChild(tr);
      });
      
      meta.textContent = `Participantes: ${data.total_participantes} · Entregados: ${data.n_entregado}`;
      box.style.display = 'block';

    } catch (e) {
      alert('No se pudo realizar el sorteo: ' + e.message);
      spinning = false; // Detener en caso de error
    } finally {
      btnSortear.disabled = false;
      btnSortear.textContent = oldTxt;
    }
  }
  /* ========= Botones existentes ========= */  
  btnSortear?.addEventListener('click', sortear);

  // efecto inicial visual
  setTimeout(()=>spawnBurst(16), 600);
})();
</script>

</body>
</html>
