<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruletazo Kenworth Aerocab T660 (2015)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #171836;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 40px;
            color: #6b6ce5;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        .ruleta-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .ruleta-wheel {
            width: 380px;
            height: 380px;
            border-radius: 50%;
            position: relative;
            background: conic-gradient(from 90deg, #b2ff8d, #ffff6b, #ffbb00, #ff7500, #ff4bff, #00d8ff, #00ffbc, #ff0000);
            border: 8px solid #4b4b6d;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.3);
            transition: transform 5s ease-out;
        }

        .result {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            text-shadow: 0px 0px 10px rgba(0, 0, 0, 0.7);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .controls input {
            font-size: 18px;
            padding: 12px;
            width: 60px;
            text-align: center;
            margin-right: 10px;
            border-radius: 8px;
            border: 2px solid #00bfae;
        }

        .controls button {
            font-size: 18px;
            padding: 12px 25px;
            background-color: #00bfae;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease;
        }

        .controls button:hover {
            background-color: #00a68c;
        }

        .footer {
            color: #b3b3b3;
            font-size: 14px;
            margin-top: 30px;
        }

    </style>
</head>
<body>

    <h1>Ruletazo Kenworth Aerocab T660 (2015)</h1>
    <div class="ruleta-container">
        <div id="ruleta" class="ruleta-wheel">
            <div class="result">RESULTADO</div>
        </div>
    </div>

    <div class="controls">
        <input type="number" id="numGanadores" placeholder="1" min="1">
        <button id="btnSortear" onclick="iniciarSorteo()">Sortear ahora</button>
    </div>

    <div class="footer">
        Inicia la jugada y deja que el destino elija. Pausa o detén con inercia para ver el resultado.
    </div>

    <script>
        function iniciarSorteo() {
            const ruleta = document.getElementById('ruleta');
            const numGanadores = document.getElementById('numGanadores').value || 1;

            // Generar número aleatorio para el resultado
            const resultado = Math.floor(Math.random() * 100);

            // Calcular un valor de rotación aleatorio
            const deg = (Math.random() * 360) + 720;

            // Animación de la ruleta
            ruleta.style.transition = 'transform 5s ease-out';
            ruleta.style.transform = `rotate(${deg}deg)`;

            // Mostrar el resultado después de la animación
            setTimeout(() => {
                document.querySelector('.result').textContent = `Ganador: ${resultado}`;
            }, 5000);
        }
    </script>

</body>
</html>
